<!DOCTYPE html>
<html>
<!-- adding a comment -->
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css" media="all">

    <script src="scrips.js" defer></script>
</head>

<body>

    <div id="currentPlayer">
            Current Player: <span></span>
    </div>

    <div id="gameResult"></div>
    <div id="gameBoard">
        <!--Row 1-->
        <div class="gameSpace row1 col1" id="a1"></div>
        <div class="gameSpace row1 col2"></div>
        <div class="gameSpace row1 col3"></div>

        <!--Row 2-->
        <div class="gameSpace row2 col1" id="b1"></div>
        <div class="gameSpace row2 col2" id="b2"></div>
        <div class="gameSpace row2 col3" id="b3"></div>
        
        <!--Row 3-->
        <div class="gameSpace row3 col1" id="c1"></div>
        <div class="gameSpace row3 col2" id="c2"></div>
        <div class="gameSpace row3 col3" id="c3"></div>
</body>
</html>
