<!DOCTYPE html>
<html>

<head>
    <title>Weather App 2.0</title>
    <link rel="stylesheet" href="styles.css" media="all">
    <script src="scripts.js" defer></script>
</head>

<body>

    <div id="modalCover"></div>
    <div id="modalForm">
        <form id="locationForm">
            <input type="text" id = "locationBox">
            <button type="Submit"> Get Weather</button>
        </form>
    </div>

    <button id="findLocation">New Location</button>

    <main>
        <div id="currentInfo">

            <div id="currentTemp"><span></span>°F</div>
            <div id="currentStatus"></div>
        </div>
        <div id="currentHumidity"><span></span></div>

        <div id="currentWind">3mph NNW</div>

        <div id="futureInfo">
            <div class="futureDay">
                <!-- <div class="futurePred">WED</div> -->
                <div class="futureTemp">75°-80°F</div>
                <div class="futureWind"> 4mph NW</div>
                <div class="futureStatus">Sunny</div>
            </div>

            <div class="futureDay">
               <!--<div class="futurePred">THU</div>-->
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind"> 6mph NW</div>
                <div class="futureStatus">Rainy</div>
            </div>

            <div class="futureDay">
                <!--<div class="futurePred">FRI</div> -->
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind"> 2mph NW</div>
                <div class="futureStatus">Sunny</div>
            </div>
        </div>
    </main>
</body>
</html>
