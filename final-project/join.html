<!DOCTYPE html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <link rel="stylesheet" href="styles.css">

  </head>
  <body>  
    
  <form>
    <label for="fname">First Name:</label>
    <input type="text" id="fname" placeholder="Enter your first name here"><br>

    <label for="lname">Last Name:</label>
    <input type="text" id="lname" placeholder="Enter your last name here"><br>

    <label for="yourEmail">Email:</label>
    <input type="email" name="yourEmail" id="yourEmail" placeholder="Enter your email here"><br>

    <label for="yourPassword">Password:</label>
    <input type="password" name="yourPassword" id="yourPassword" placeholder="Create New Password"><br>

    <input type="gender">
    <input type="radio" name="gender" id="male" value="male">
    <input type="radio" name="gender" id="female" value="female"><br>
  </form>
  
  </body>
  </html>
