<body>
  <div class="join-message">
    <h4>Hey There! We are glad you are interested in joiming our team. Fill out this form and expect to hear back
      from us within 72 business hours!</h4>
  </div>
  <div class="join-container">
    <div class="form-wrap">
      <form>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" placeholder="Enter your first name here"><br>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" placeholder="Enter your last name here"><br>

        <label for="yourEmail">Email:</label>
        <input type="email" name="yourEmail" id="yourEmail" placeholder="Enter your email here"><br>

        <label for="yourPassword">Password:</label>
        <input type="password" name="yourPassword" id="yourPassword" placeholder="Create New Password"><br>

        <label for="gender">Gender:</label>
        <label for="male" input type="radio"></label>
        <input type="radio" name="gender" id="male" value="male">
        Male
        </label>
        <label for="female">
          <input type="radio" name="gender" id="female" value="female">
          Female
        </label>
        <label for="other">
          <input type="radio" name="gender" id="other" value="other"><br>
          Other
        </label>

        <br><br><input type="submit" value="Join Now">
      </form>
    </div>
  </div>

</body>
